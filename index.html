<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الغياب السريع</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .btn { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>📋 تسجيل الغياب</h3>
    <p>التلميذ: <b>أحمد بنسعيد</b></p>
    <button class="btn" onclick="informParent('212651324869', 'أحمد بنسعيد')">إرسال واتساب 📲</button>
</div>

<script>
function informParent(phone, name) {
    const msg = `تنبيه: التلميذ(ة) ${name} غائب(ة) اليوم عن الحصة. المرجو التواصل مع الإدارة.`;
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    
    // هادي كتحل واتساب في نافذة جديدة بلا ما يسد الموقع الأصلي
    window.open(url, '_blank').focus();
}
</script>

</body>
</html>
